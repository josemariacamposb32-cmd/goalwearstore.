<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOALWEAR | Camisetas de fútbol</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
    color:#111;
}

header{
    background:#000;
    color:white;
    position:sticky;
    top:0;
    z-index:1000;
}

.cabecera{
    max-width:1200px;
    margin:auto;
    min-height:72px;
    padding:0 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:25px;
}

.logo{
    display:flex;
    align-items:center;
    text-decoration:none;
}

.logo img{
    width:170px;
    height:auto;
    display:block;
}

.menu{
    display:flex;
    align-items:center;
    gap:28px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-size:15px;
    font-weight:700;
}

.menu a:hover{
    color:#f4c400;
}

.contacto{
    background:#f4c400;
    color:#000 !important;
    padding:11px 18px;
    border-radius:30px;
}

.hero{
    min-height:520px;
    padding:60px 20px;
    background-image:
        linear-gradient(
            rgba(0,0,0,0.25),
            rgba(0,0,0,0.80)
        ),
        url("espana-local.jpg");
    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;
    display:flex;
    align-items:flex-end;
}

.hero-contenido{
    width:100%;
    max-width:1200px;
    margin:0 auto;
    color:#ffffff;
    padding-bottom:35px;
}

.hero-etiqueta{
    font-size:14px;
    font-weight:800;
    letter-spacing:2px;
    margin-bottom:14px;
}

.hero h1{
    color:#ffffff;
    font-size:64px;
    line-height:1;
    margin-bottom:18px;
}

.hero-texto{
    max-width:560px;
    color:#ffffff;
    font-size:20px;
    line-height:1.5;
    margin-bottom:28px;
}

.hero-boton{
    display:inline-block;
    background:#ffffff;
    color:#000000;
    text-decoration:none;
    padding:15px 25px;
    border-radius:30px;
    font-weight:800;
}

.catalogo{
    max-width:1200px;
    margin:auto;
    padding:70px 20px 30px;
}

.catalogo-cabecera{
    max-width:680px;
    margin-bottom:40px;
}

.catalogo-etiqueta{
    font-size:13px;
    font-weight:800;
    letter-spacing:2px;
    color:#777;
    margin-bottom:12px;
}

.catalogo h2{
    font-size:42px;
    line-height:1.1;
    margin-bottom:14px;
}

.catalogo-cabecera > p:last-child{
    color:#555;
    font-size:18px;
    line-height:1.5;
}

@media(max-width:700px){

    .cabecera{
        min-height:auto;
        padding:16px 18px;
        flex-direction:column;
        gap:14px;
    }

    .logo img{
        width:150px;
    }

    .menu{
        width:100%;
        justify-content:center;
        gap:16px;
        flex-wrap:wrap;
    }

    .menu a{
        font-size:13px;
    }

    .hero{
        min-height:560px;
        padding:40px 20px;
        background-position:center top;
    }

    .hero h1{
        font-size:48px;
    }

    .hero-texto{
        font-size:17px;
    }

    .catalogo{
        padding:50px 18px 25px;
    }

    .catalogo h2{
        font-size:34px;
    }

    .catalogo-cabecera > p:last-child{
        font-size:16px;
    }

}

</style>

</head>

<body>

<header>

<div class="cabecera">

<a href="index.html" class="logo">
    <img src="logo-goalwear.png" alt="Logo GOALWEAR">
</a>

<nav class="menu">

<a href="index.html">
Inicio
</a>

<a href="#productos">
Camisetas
</a>

<a href="#productos">
Novedades
</a>

<a href="https://wa.me/34633329423" class="contacto">
Contacto
</a>

</nav>

</div>

</header>

<section class="hero">

<div class="hero-contenido">

<p class="hero-etiqueta">
NUEVA TEMPORADA 2026/27
</p>

<h1>
Viste tu pasión.
</h1>

<p class="hero-texto">
Las mejores camisetas de fútbol con parches oficiales y serigrafía personalizada.
</p>

<a href="#productos" class="hero-boton">
Comprar ahora
</a>

</div>

</section>

<section class="catalogo" id="productos">

<div class="catalogo-cabecera">

<p class="catalogo-etiqueta">
NUEVA COLECCIÓN
</p>

<h2>
Productos destacados
</h2>

<p>
Descubre las camisetas disponibles para la temporada 2026/27.
</p>

</div>

</section>

</body>

</html>
