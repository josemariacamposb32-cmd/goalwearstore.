.cabecera{

.logo{

.menu{

.boton-contacto{

        flex-direction:column;
        gap:12px;
    }

    .menu{
        width:100%;
        justify-content:center;
        gap:14px;
        flex-wrap:wrap;
    }

    .menu a{
        font-size:13px;
    }
}

h1{
    color:gold;
}

.banner{
    text-align:center;
    padding:40px 20px;
}

.banner h2{
    font-size:32px;
}

.productos{
    display:grid;

    padding:20px;
}

.card{
    background:#1c1c1c;
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    padding-bottom:20px;
}

.card img{

.precio{

button{

    border-radius:30px;
    font-size:18px;
    cursor:pointer;

footer{
